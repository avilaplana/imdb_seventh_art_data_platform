version: 2

models:
  - name: fact_title_genre
    description: >
      Fact table linking titles to genres.

    config:
      contract:
        enforced: true

    columns:
      - name: title_id
        description: Foreign key referencing dim_title.
        data_type: string
        tests:
          - not_null
          - relationships:
              to: ref('dim_title')
              field: title_id

      - name: genre_name
        description: Genre assigned to the title.
        data_type: string
        tests:
          - not_null

      - name: release_year
        description: Release year of the title.
        data_type: integer

      - name: average_rating
        description: Average IMDb rating of the title.
        data_type: numeric

      - name: number_of_votes
        description: Number of votes received by the title.
        data_type: integer