dataset: movie_sql_eval_analytics
version: 1.0
engine: spark_sql
storage: iceberg
execution: thrift_server

catalog: demo
schema: stage_analytics

global_assumptions:
  - "title_type_name and genre_name are plain string columns — filter directly, no join needed"
  - "movie means title_type_name = 'movie'"
  - "tvSeries means title_type_name = 'tvSeries'"
  - "Use fact_title_genre_flat for genre-based questions"
  - "Use fact_title_cast_crew + dim_person for cast/crew questions"
  - "Use fact_episode for episode and season questions"
  - "Use fact_title_release for localized title, region, or language questions"
  - "Booleans use true/false"
  - "Case-insensitive search uses LOWER() LIKE"
  - "Relative years use YEAR(CURRENT_DATE())"

questions:

################################
# SIMPLE
################################

- id: simple_01
  difficulty: simple
  natural_language: "List the 10 highest-rated movies released in 2020."
  sql_expected: |
    SELECT primary_title, average_rating
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND release_year = 2020
      AND average_rating IS NOT NULL
    ORDER BY average_rating DESC
    LIMIT 10;

- id: simple_02
  difficulty: simple
  natural_language: "Show all movies released in 1999 with a rating of at least 8 out of 10."
  sql_expected: |
    SELECT primary_title, average_rating
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND release_year = 1999
      AND average_rating >= 8;

- id: simple_03
  difficulty: simple
  natural_language: "Find the details of the movie titled 'Inception'."
  sql_expected: |
    SELECT title_id, primary_title, original_title, title_type_name, release_year,
           duration_minutes, average_rating, number_of_votes
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND primary_title = 'Inception';

- id: simple_04
  difficulty: simple
  natural_language: "List all movies released after 2015 that are marked as adult content."
  sql_expected: |
    SELECT primary_title, release_year
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND release_year > 2015
      AND is_adult = true;

- id: simple_05
  difficulty: simple
  natural_language: "Show all movies that have a runtime longer than 150 minutes."
  sql_expected: |
    SELECT primary_title, duration_minutes
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND duration_minutes > 150;

- id: simple_06
  difficulty: simple
  natural_language: "Find all titles released in Spain in the Spanish language."
  sql_expected: |
    SELECT DISTINCT t.primary_title
    FROM demo.stage_analytics.fact_title_release r
    JOIN demo.stage_analytics.dim_title t ON r.title_id = t.title_id
    WHERE r.region_name = 'Spain'
      AND r.language_name = 'Spanish';

- id: simple_07
  difficulty: simple
  natural_language: "List all movies that have no user rating yet."
  sql_expected: |
    SELECT primary_title
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND average_rating IS NULL;

- id: simple_08
  difficulty: simple
  natural_language: "Show all titles released in 2023 along with their primary title and release year."
  sql_expected: |
    SELECT primary_title, release_year
    FROM demo.stage_analytics.dim_title
    WHERE release_year = 2023;

- id: simple_09
  difficulty: simple
  natural_language: "List the first 20 titles in the catalog ordered by release year ascending."
  sql_expected: |
    SELECT primary_title, release_year
    FROM demo.stage_analytics.dim_title
    ORDER BY release_year ASC
    LIMIT 20;

- id: simple_10
  difficulty: simple
  natural_language: "Show all movies whose primary title contains the word 'Star'."
  sql_expected: |
    SELECT primary_title
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND LOWER(primary_title) LIKE '%star%';

################################
# MEDIUM
################################

- id: medium_01
  difficulty: medium
  natural_language: "For each genre, what is the average rating of movies released after 2010?"
  sql_expected: |
    SELECT genre_name, ROUND(AVG(average_rating), 2) AS avg_rating
    FROM demo.stage_analytics.fact_title_genre_flat
    WHERE title_type_name = 'movie'
      AND release_year > 2010
      AND average_rating IS NOT NULL
    GROUP BY genre_name;

- id: medium_02
  difficulty: medium
  natural_language: "List the top 10 highest-rated action movies of all time."
  sql_expected: |
    SELECT t.primary_title, f.average_rating
    FROM demo.stage_analytics.fact_title_genre_flat f
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE f.title_type_name = 'movie'
      AND f.genre_name = 'Action'
      AND f.average_rating IS NOT NULL
    ORDER BY f.average_rating DESC
    LIMIT 10;

- id: medium_03
  difficulty: medium
  natural_language: "For each year since 2000, how many movies were released?"
  sql_expected: |
    SELECT release_year, COUNT(DISTINCT title_id) AS movie_count
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND release_year >= 2000
    GROUP BY release_year
    ORDER BY release_year;

- id: medium_04
  difficulty: medium
  natural_language: "Show the 20 most recent movies along with their average rating and number of votes."
  sql_expected: |
    SELECT primary_title, release_year, average_rating, number_of_votes
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND release_year <= YEAR(CURRENT_DATE())
    ORDER BY release_year DESC
    LIMIT 20;

- id: medium_05
  difficulty: medium
  natural_language: "List all movies that belong to both the 'Action' and 'Adventure' genres."
  sql_expected: |
    SELECT f.title_id, t.primary_title
    FROM demo.stage_analytics.fact_title_genre_flat f
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE f.title_type_name = 'movie'
      AND f.genre_name IN ('Action', 'Adventure')
    GROUP BY f.title_id, t.primary_title
    HAVING COUNT(DISTINCT f.genre_name) = 2;

- id: medium_06
  difficulty: medium
  natural_language: "Find the top 10 movies by rating that were released in the United States."
  sql_expected: |
    SELECT t.primary_title, t.average_rating
    FROM demo.stage_analytics.fact_title_release r
    JOIN demo.stage_analytics.dim_title t ON r.title_id = t.title_id
    WHERE r.region_name = 'United States'
      AND t.title_type_name = 'movie'
      AND t.average_rating IS NOT NULL
    ORDER BY t.average_rating DESC
    LIMIT 10;

- id: medium_07
  difficulty: medium
  natural_language: "For each genre, show the number of movies with a rating below 5."
  sql_expected: |
    SELECT genre_name, COUNT(DISTINCT title_id) AS low_rated_movies
    FROM demo.stage_analytics.fact_title_genre_flat
    WHERE title_type_name = 'movie'
      AND average_rating < 5
    GROUP BY genre_name;

- id: medium_08
  difficulty: medium
  natural_language: "List all movies with an average rating above 8 that have received at least 10,000 votes."
  sql_expected: |
    SELECT primary_title, average_rating, number_of_votes
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND average_rating > 8
      AND number_of_votes >= 10000;

- id: medium_09
  difficulty: medium
  natural_language: "Show the top 10 'Comedy' movies released between 2010 and 2020 by rating."
  sql_expected: |
    SELECT t.primary_title, f.average_rating
    FROM demo.stage_analytics.fact_title_genre_flat f
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE f.genre_name = 'Comedy'
      AND f.title_type_name = 'movie'
      AND f.release_year BETWEEN 2010 AND 2020
      AND f.average_rating IS NOT NULL
    ORDER BY f.average_rating DESC
    LIMIT 10;

- id: medium_10
  difficulty: medium
  natural_language: "For each year, show the number of new titles and the average rating of those titles."
  sql_expected: |
    SELECT release_year, COUNT(*) AS title_count, ROUND(AVG(average_rating), 2) AS avg_rating
    FROM demo.stage_analytics.dim_title
    WHERE average_rating IS NOT NULL
    GROUP BY release_year
    ORDER BY release_year;

################
# HARD
################

- id: hard_01
  difficulty: hard
  natural_language: "Find the top 5 actors with the highest average movie rating in the last 5 years, considering only movies where they had a leading role and at least 5 such movies."
  sql_expected: |
    SELECT p.name, ROUND(AVG(f.average_rating), 2) AS avg_rating
    FROM demo.stage_analytics.fact_title_cast_crew f
    JOIN demo.stage_analytics.dim_person p ON f.person_id = p.person_id
    WHERE f.role_name IN ('actor', 'actress')
      AND f.release_year >= YEAR(CURRENT_DATE()) - 5
      AND f.average_rating IS NOT NULL
    GROUP BY p.name
    HAVING COUNT(*) >= 5
    ORDER BY avg_rating DESC
    LIMIT 5;

- id: hard_02
  difficulty: hard
  natural_language: "For each genre, list the top 3 movies by rating released in the last 10 years."
  sql_expected: |
    SELECT genre_name, title_id, average_rating
    FROM (
      SELECT genre_name, title_id, average_rating,
             ROW_NUMBER() OVER (PARTITION BY genre_name ORDER BY average_rating DESC) AS rn
      FROM demo.stage_analytics.fact_title_genre_flat
      WHERE title_type_name = 'movie'
        AND release_year >= YEAR(CURRENT_DATE()) - 10
        AND average_rating IS NOT NULL
    ) ranked
    WHERE rn <= 3;

- id: hard_03
  difficulty: hard
  natural_language: "Find the directors whose movies have the highest average rating, considering only directors with at least 10 movies."
  sql_expected: |
    SELECT p.name, ROUND(AVG(f.average_rating), 2) AS avg_rating
    FROM demo.stage_analytics.fact_title_cast_crew f
    JOIN demo.stage_analytics.dim_person p ON f.person_id = p.person_id
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE f.role_name = 'director'
      AND f.average_rating IS NOT NULL
      AND t.title_type_name = 'movie'
    GROUP BY p.name
    HAVING COUNT(DISTINCT f.title_id) >= 10
    ORDER BY avg_rating DESC;

- id: hard_04
  difficulty: hard
  natural_language: "For each year in the last 20 years, find the genre with the highest average rating."
  sql_expected: |
    SELECT release_year, genre_name, avg_rating
    FROM (
      SELECT release_year, genre_name,
             ROUND(AVG(average_rating), 2) AS avg_rating,
             ROW_NUMBER() OVER (PARTITION BY release_year ORDER BY AVG(average_rating) DESC) AS rn
      FROM demo.stage_analytics.fact_title_genre_flat
      WHERE release_year >= YEAR(CURRENT_DATE()) - 20
        AND average_rating IS NOT NULL
      GROUP BY release_year, genre_name
    ) ranked
    WHERE rn = 1;

- id: hard_05
  difficulty: hard
  natural_language: "Find the top 10 actors by total number of votes across all movies they have acted in."
  sql_expected: |
    SELECT p.name, SUM(f.number_of_votes) AS total_votes
    FROM demo.stage_analytics.fact_title_cast_crew f
    JOIN demo.stage_analytics.dim_person p ON f.person_id = p.person_id
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE f.role_name IN ('actor', 'actress')
      AND t.title_type_name = 'movie'
      AND f.number_of_votes IS NOT NULL
    GROUP BY p.name
    ORDER BY total_votes DESC
    LIMIT 10;

- id: hard_06
  difficulty: hard
  natural_language: "For each genre, compute the share of movies that are adult content and show only genres where this share is above 20%."
  sql_expected: |
    SELECT genre_name,
           SUM(CASE WHEN is_adult = true THEN 1 ELSE 0 END) / COUNT(*) AS adult_share
    FROM demo.stage_analytics.fact_title_genre_flat
    WHERE title_type_name = 'movie'
    GROUP BY genre_name
    HAVING SUM(CASE WHEN is_adult = true THEN 1 ELSE 0 END) / COUNT(*) > 0.2;

- id: hard_07
  difficulty: hard
  natural_language: "Find all movies that feature both 'Leonardo DiCaprio' and 'Kate Winslet' and list their titles and release years."
  sql_expected: |
    SELECT t.primary_title, t.release_year
    FROM demo.stage_analytics.fact_title_cast_crew f
    JOIN demo.stage_analytics.dim_person p ON f.person_id = p.person_id
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE p.name IN ('Leonardo DiCaprio', 'Kate Winslet')
      AND t.title_type_name = 'movie'
    GROUP BY t.title_id, t.primary_title, t.release_year
    HAVING COUNT(DISTINCT p.name) = 2;

- id: hard_08
  difficulty: hard
  natural_language: "For each actor, compute the number of movies they appeared in before 2000 and after 2000, and show only actors who have at least 5 movies in each period."
  sql_expected: |
    SELECT p.name,
           SUM(CASE WHEN f.release_year < 2000 THEN 1 ELSE 0 END) AS before_2000,
           SUM(CASE WHEN f.release_year >= 2000 THEN 1 ELSE 0 END) AS after_2000
    FROM demo.stage_analytics.fact_title_cast_crew f
    JOIN demo.stage_analytics.dim_person p ON f.person_id = p.person_id
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE f.role_name IN ('actor', 'actress')
      AND t.title_type_name = 'movie'
    GROUP BY p.name
    HAVING before_2000 >= 5 AND after_2000 >= 5;

- id: hard_09
  difficulty: hard
  natural_language: "Find the top 10 movies that improved the most in rating compared to the average rating of movies released in the same year and genre."
  sql_expected: |
    WITH yearly_genre_avg AS (
      SELECT release_year, genre_name, AVG(average_rating) AS avg_rating
      FROM demo.stage_analytics.fact_title_genre_flat
      WHERE title_type_name = 'movie'
        AND average_rating IS NOT NULL
      GROUP BY release_year, genre_name
    )
    SELECT t.primary_title, f.release_year,
           ROUND(f.average_rating - yga.avg_rating, 2) AS rating_improvement
    FROM demo.stage_analytics.fact_title_genre_flat f
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    JOIN yearly_genre_avg yga ON f.release_year = yga.release_year AND f.genre_name = yga.genre_name
    WHERE f.title_type_name = 'movie'
      AND f.average_rating IS NOT NULL
    ORDER BY rating_improvement DESC
    LIMIT 10;

- id: hard_10
  difficulty: hard
  natural_language: "For each of the last 5 years, list the top 3 directors by average rating of their movies in that year, considering only directors with at least 3 movies for that year."
  sql_expected: |
    SELECT release_year, name, avg_rating
    FROM (
      SELECT f.release_year, p.name,
             ROUND(AVG(f.average_rating), 2) AS avg_rating,
             ROW_NUMBER() OVER (PARTITION BY f.release_year ORDER BY AVG(f.average_rating) DESC) AS rn
      FROM demo.stage_analytics.fact_title_cast_crew f
      JOIN demo.stage_analytics.dim_person p ON f.person_id = p.person_id
      JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
      WHERE f.role_name = 'director'
        AND f.release_year >= YEAR(CURRENT_DATE()) - 5
        AND f.average_rating IS NOT NULL
        AND t.title_type_name = 'movie'
      GROUP BY f.release_year, p.name
      HAVING COUNT(DISTINCT f.title_id) >= 3
    ) ranked
    WHERE rn <= 3;

####################################
# ANALYTICS (star schema specific)
####################################

- id: analytics_01
  difficulty: simple
  natural_language: "List the top 10 highest-rated TV series of all time."
  sql_expected: |
    SELECT primary_title, average_rating, number_of_votes
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'tvSeries'
      AND average_rating IS NOT NULL
    ORDER BY average_rating DESC
    LIMIT 10;

- id: analytics_02
  difficulty: simple
  natural_language: "Show the top 5 episodes of 'Breaking Bad' ordered by rating."
  sql_expected: |
    SELECT episode_primary_title, season_number, episode_number, episode_average_rating
    FROM demo.stage_analytics.fact_episode
    WHERE LOWER(series_primary_title) = 'breaking bad'
      AND episode_average_rating IS NOT NULL
    ORDER BY episode_average_rating DESC
    LIMIT 5;

- id: analytics_03
  difficulty: medium
  natural_language: "For each season of 'Game of Thrones', show the average episode rating."
  sql_expected: |
    SELECT season_number, ROUND(AVG(episode_average_rating), 2) AS avg_episode_rating
    FROM demo.stage_analytics.fact_episode
    WHERE LOWER(series_primary_title) = 'game of thrones'
      AND episode_average_rating IS NOT NULL
    GROUP BY season_number
    ORDER BY season_number;

- id: analytics_04
  difficulty: simple
  natural_language: "List all titles from the 1990s with a rating above 8."
  sql_expected: |
    SELECT primary_title, release_year, average_rating
    FROM demo.stage_analytics.dim_title
    WHERE decade = '1990s'
      AND average_rating > 8
    ORDER BY average_rating DESC;

- id: analytics_05
  difficulty: simple
  natural_language: "Show the distribution of movies across rating buckets."
  sql_expected: |
    SELECT rating_bucket, COUNT(*) AS movie_count
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND rating_bucket IS NOT NULL
    GROUP BY rating_bucket
    ORDER BY rating_bucket;

- id: analytics_06
  difficulty: medium
  natural_language: "For each decade, what is the average rating and total number of movies?"
  sql_expected: |
    SELECT decade, COUNT(*) AS movie_count, ROUND(AVG(average_rating), 2) AS avg_rating
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'movie'
      AND decade IS NOT NULL
      AND average_rating IS NOT NULL
    GROUP BY decade
    ORDER BY decade;

- id: analytics_07
  difficulty: medium
  natural_language: "Find the TV series with the most episodes."
  sql_expected: |
    SELECT series_primary_title, COUNT(*) AS episode_count
    FROM demo.stage_analytics.fact_episode
    GROUP BY series_title_id, series_primary_title
    ORDER BY episode_count DESC
    LIMIT 10;

- id: analytics_08
  difficulty: medium
  natural_language: "List the top 10 Drama movies with the most votes."
  sql_expected: |
    SELECT t.primary_title, f.number_of_votes
    FROM demo.stage_analytics.fact_title_genre_flat f
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE f.genre_name = 'Drama'
      AND f.title_type_name = 'movie'
      AND f.number_of_votes IS NOT NULL
    ORDER BY f.number_of_votes DESC
    LIMIT 10;

- id: analytics_09
  difficulty: medium
  natural_language: "Find all composers who have worked on more than 20 movies."
  sql_expected: |
    SELECT p.name, COUNT(DISTINCT f.title_id) AS movie_count
    FROM demo.stage_analytics.fact_title_cast_crew f
    JOIN demo.stage_analytics.dim_person p ON f.person_id = p.person_id
    JOIN demo.stage_analytics.dim_title t ON f.title_id = t.title_id
    WHERE f.role_name = 'composer'
      AND t.title_type_name = 'movie'
    GROUP BY p.name
    HAVING COUNT(DISTINCT f.title_id) > 20
    ORDER BY movie_count DESC;

- id: analytics_10
  difficulty: medium
  natural_language: "Show the localized French titles of the top 20 highest-rated movies."
  sql_expected: |
    SELECT t.primary_title, r.localized_title, t.average_rating
    FROM demo.stage_analytics.dim_title t
    JOIN demo.stage_analytics.fact_title_release r ON t.title_id = r.title_id
    WHERE t.title_type_name = 'movie'
      AND t.average_rating IS NOT NULL
      AND r.language_name = 'French'
    ORDER BY t.average_rating DESC
    LIMIT 20;

- id: analytics_11
  difficulty: hard
  natural_language: "Find the top 10 series where the best episode rating exceeded the series average rating by the most."
  sql_expected: |
    SELECT series_primary_title,
           MAX(episode_average_rating) AS best_episode_rating,
           series_average_rating,
           ROUND(MAX(episode_average_rating) - series_average_rating, 2) AS improvement
    FROM demo.stage_analytics.fact_episode
    WHERE episode_average_rating IS NOT NULL
      AND series_average_rating IS NOT NULL
    GROUP BY series_title_id, series_primary_title, series_average_rating
    ORDER BY improvement DESC
    LIMIT 10;

- id: analytics_12
  difficulty: hard
  natural_language: "For each genre, how many distinct directors have worked on movies in that genre?"
  sql_expected: |
    SELECT f.genre_name, COUNT(DISTINCT c.person_id) AS director_count
    FROM demo.stage_analytics.fact_title_genre_flat f
    JOIN demo.stage_analytics.fact_title_cast_crew c ON f.title_id = c.title_id
    WHERE f.title_type_name = 'movie'
      AND c.role_name = 'director'
    GROUP BY f.genre_name
    ORDER BY director_count DESC;

- id: analytics_13
  difficulty: simple
  natural_language: "List all mini-series released after 2010 with a rating above 8."
  sql_expected: |
    SELECT primary_title, release_year, average_rating
    FROM demo.stage_analytics.dim_title
    WHERE title_type_name = 'tvMiniSeries'
      AND release_year > 2010
      AND average_rating > 8
    ORDER BY average_rating DESC;

- id: analytics_14
  difficulty: medium
  natural_language: "For each season of 'The Wire', count the number of episodes and show the average rating."
  sql_expected: |
    SELECT season_number,
           COUNT(*) AS episode_count,
           ROUND(AVG(episode_average_rating), 2) AS avg_rating
    FROM demo.stage_analytics.fact_episode
    WHERE LOWER(series_primary_title) = 'the wire'
    GROUP BY season_number
    ORDER BY season_number;

- id: analytics_15
  difficulty: hard
  natural_language: "Find the top 5 actors who have appeared in the most distinct genres across their movie career."
  sql_expected: |
    SELECT p.name, COUNT(DISTINCT f.genre_name) AS genre_count
    FROM demo.stage_analytics.fact_title_cast_crew c
    JOIN demo.stage_analytics.dim_person p ON c.person_id = p.person_id
    JOIN demo.stage_analytics.fact_title_genre_flat f ON c.title_id = f.title_id
    WHERE c.role_name IN ('actor', 'actress')
      AND f.title_type_name = 'movie'
    GROUP BY p.name
    ORDER BY genre_count DESC
    LIMIT 5;
